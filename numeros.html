<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha seus Números</title>
    <style>
        :root {
            --livre: #4ade80;
            --reservado: #facc15;
            --pago: #f87171;
            --text-dark: #1e293b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8fafc; color: var(--text-dark); padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 20px; text-align: center; }
        .btn-voltar { display: inline-block; margin-bottom: 20px; color: #2563eb; text-decoration: none; font-weight: bold; }
        
        /* Legenda */
        .legenda { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; font-size: 0.9rem; }
        .legenda-item { display: flex; align-items: center; gap: 5px; }
        .box-cor { width: 18px; height: 18px; border-radius: 4px; }
        
        /* Grid de Números */
        .grid-numeros { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .numero-card { height: 55px; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 6px; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); user-select: none; font-size: 1.1rem; transition: transform 0.1s; }
        .numero-card:active { transform: scale(0.95); }
        
        /* Cores dos Status */
        .status-livre { background-color: var(--livre); color: #064e3b; }
        .status-reservado { background-color: var(--reservado); color: #713f12; cursor: not-allowed; }
        .status-pago { background-color: var(--pago); color: #7f1d1d; cursor: not-allowed; }
        
        #loading { text-align: center; font-weight: bold; margin: 20px 0; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn-voltar">⬅ Voltar para Informações</a>
    <h1>Escolha seus Números</h1>

    <!-- Legenda explicativa -->
    <div class="legenda">
        <div class="legenda-item"><div class="box-cor" style="background-color: var(--livre)"></div> Livre</div>
        <div class="legenda-item"><div class="box-cor" style="background-color: var(--reservado)"></div> Reservado</div>
        <div class="legenda-item"><div class="box-cor" style="background-color: var(--pago)"></div> Pago</div>
    </div>

    <div id="loading">Buscando status dos números na planilha...</div>
    <div class="grid-numeros" id="gridNumeros"></div>
</div>

<script>
    // ⚠️ COLE AQUI O SEU LINK DO GOOGLE SHEETS (O LINK QUE TERMINA COM .csv)
    const URL_PLANILHA = 'COLE_SEU_LINK_DO_CSV_AQUI'; 

    async function carregarNumeros() {
        if (URL_PLANILHA === 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSE1RcSlxJ_SLnrvDZEKtzsuRabnO6l1GX9HxBS-d1Pyx-E0VdokuiDuI1HXXQCA_zkGB5Wu-XKV_EN/pub?gid=0&single=true&output=csv') {
            document.getElementById('loading').innerText = "Por favor, configure o link da sua planilha no código.";
            return;
        }

        try {
            // Força a busca atualizada ignorando o cache do navegador
            const response = await fetch(`${URL_PLANILHA}?t=${new Date().getTime()}`);
            const data = await response.text();
            
            document.getElementById('loading').style.display = 'none';
            parsearCSV(data);
        } catch (error) {
            console.error("Erro ao buscar dados do Google Sheets:", error);
            document.getElementById('loading').innerText = "Erro ao carregar os números da planilha. Verifique se ela foi publicada corretamente.";
        }
    }

    function parsearCSV(textoCSV) {
        const linhas = textoCSV.split('\n');
        const grid = document.getElementById('gridNumeros');
        grid.innerHTML = ''; // Limpa o grid

        // Ignora a primeira linha (cabeçalho) e percorre o resto
        for (let i = 1; i < linhas.length; i++) {
            if (!linhas[i].trim()) continue; // Ignora linhas vazias

            // Divide as colunas por vírgula
            const colunas = linhas[i].split(',');
            
            const numero = colunas[0]?.replace(/"/g, '').trim();
            // Normaliza o status para evitar problemas com espaços ou maiúsculas
            const status = colunas[1]?.replace(/"/g, '').trim().toLowerCase() || 'livre';

            if (!numero) continue;

            // Cria o quadradinho do número
            const card = document.createElement('div');
            card.classList.add('numero-card');
            
            // Define a classe de cor baseada no status mapeado da planilha
            if (status === 'pago') {
                card.classList.add('status-pago');
                card.title = "Número já pago";
            } else if (status === 'reservado') {
                card.classList.add('status-reservado');
                card.title = "Número reservado";
            } else {
                card.classList.add('status-livre');
                card.title = "Clique para escolher este número";
                
                // Ação ao clicar em um número livre
                card.addEventListener('click', () => {
                    alert(`Você selecionou o número ${numero}!`);
                    // Aqui futuramente podemos abrir um modal ou redirecionar para o WhatsApp de compra
                });
            }
            
            card.innerText = numero;
            grid.appendChild(card);
        }
    }

    carregarNumeros();
</script>
</body>
</html>
